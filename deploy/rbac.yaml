apiVersion: v1
kind: ServiceAccount
metadata:
  name: kata-device-plugin
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kata-device-plugin
rules:
  # Read node labels so the dispatcher can select the right plugin variant.
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list, watch]
  # Write NodeFeature objects (used by the clique-discovery probe, same SA).
  - apiGroups: [nfd.k8s-sigs.io]
    resources: [nodefeatures]
    verbs: [get, list, watch, create, update, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kata-device-plugin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kata-device-plugin
subjects:
  - kind: ServiceAccount
    name: kata-device-plugin
    namespace: kube-system
